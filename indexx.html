<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soap Agency - Final Stable POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066FF;
            --danger: #ef4444;
            --success: #10b981;
            --bg-main: #f0f4f8;
            --sidebar: #0f172a;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 240px; background-color: var(--sidebar); display: flex; flex-direction: column; padding: 20px; color: white; }
        .logo-section { padding: 20px 0; text-align: center; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .logo-section h2 { font-size: 1.2rem; color: #38bdf8; }

        .main-content { flex: 1; display: flex; padding: 20px; gap: 20px; }
        .product-section { flex: 2; display: flex; flex-direction: column; }
        
        .search-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 2px solid transparent; }
        .search-bar:focus-within { border-color: var(--primary); }
        .search-bar input { width: 100%; border: none; outline: none; font-size: 1rem; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; overflow-y: auto; padding: 5px; }
        .product-card { background: white; padding: 15px; border-radius: 16px; text-align: center; cursor: pointer; border: 2px solid transparent; outline: none; transition: 0.2s; }
        .product-card:focus { border-color: var(--primary); background: #f0f7ff; transform: translateY(-3px); }
        .product-img { width: 50px; height: 50px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .cart-panel { flex: 1; background: white; border-radius: 24px; padding: 25px; display: flex; flex-direction: column; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .cart-items { flex: 1; overflow-y: auto; margin: 15px 0; }
        
        .cart-item { 
            background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; 
        }
        .item-actions { display: flex; gap: 10px; align-items: center; }
        .btn-edit { color: var(--primary); cursor: pointer; font-size: 0.8rem; font-weight: 700; border: 1px solid var(--primary); padding: 2px 8px; border-radius: 4px; }
        .btn-delete { color: var(--danger); cursor: pointer; font-size: 1.2rem; font-weight: 700; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .premium-modal { background: white; width: 400px; border-radius: 25px; padding: 30px; text-align: center; }
        .qty-input { width: 100%; padding: 12px; font-size: 1.5rem; text-align: center; border: 2px solid #e2e8f0; border-radius: 12px; margin: 15px 0; outline: none; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #0055dd; }

        .receipt-card { background: #f8fafc; border-radius: 15px; padding: 15px; margin: 15px 0; text-align: left; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-section"><h2>CLEAN AGENCY</h2></div>
        <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 15px;">Shortcuts:<br>TAB: Browse<br>ENTER: Select<br>F10: Checkout<br>ESC: Close</p>
    </div>

    <div class="main-content">
        <div class="product-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search item... (Tab to browse)" onkeyup="filterProducts()" tabindex="1">
            </div>
            <div class="grid-container" id="productGrid"></div>
        </div>

        <div class="cart-panel">
            <h3>Current Order (<span id="itemCount">0</span>)</h3>
            <div class="cart-items" id="cartItems"></div>
            <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between;">
                <span>Total:</span> <span id="total" style="color:var(--primary)">Rs 0</span>
            </div>
            <button class="btn-main" onclick="openCheckoutModal()">Process Sale (F10)</button>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="qtyModal">
        <div class="premium-modal">
            <h2 id="modalTitle">Enter Quantity</h2>
            <p id="modalPName" style="color: #64748b; margin: 10px 0;"></p>
            <input type="number" class="qty-input" id="qtyInput" value="1" min="1">
            <button class="btn-main" onclick="handleConfirm()">Confirm (Enter)</button>
            <button style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer;" onclick="closeModal('qtyModal')">Cancel (Esc)</button>
        </div>
    </div>

    <!-- Checkout Success Modal -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="premium-modal">
            <div style="background:#ecfdf5; color:var(--success); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px; font-size:30px;">✓</div>
            <h2>Order Complete</h2>
            <div class="receipt-card">
                <div id="receiptContent" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
                <div style="border-top: 2px solid white; padding-top: 10px; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.1rem;">
                    <span>Grand Total</span><span id="modalTotal">Rs 0</span>
                </div>
            </div>
            <button class="btn-main" onclick="finalizeOrder()">New Order</button>
            <button style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer;" onclick="closeModal('checkoutModal')">Back to Edit</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Premium Soap Bar', price: 120, img: 'SB' },
            { id: 2, name: 'Ultra Detergent 1kg', price: 450, img: 'UD' },
            { id: 3, name: 'Liquid Sraf 500ml', price: 320, img: 'LS' },
            { id: 4, name: 'Antibacterial Soap', price: 150, img: 'AS' },
            { id: 5, name: 'Dish Wash Pack', price: 280, img: 'DW' }
        ];

        let cart = [];
        let activeProduct = null;
        let editIdx = -1;

        function renderProducts(filter = "") {
            const grid = document.getElementById('productGrid');
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" tabindex="2" onclick="openAddModal(${p.id})" onkeypress="if(event.key==='Enter') openAddModal(${p.id})">
                    <div class="product-img">${p.img}</div>
                    <div class="product-name">${p.name}</div>
                    <b style="color:var(--primary)">Rs ${p.price}</b>
                </div>
            `).join('');
        }

        function openAddModal(id) {
            editIdx = -1;
            activeProduct = products.find(p => p.id === id);
            showModal("qtyModal", "Add to Order", activeProduct.name, 1);
        }

        function openEditModal(idx) {
            editIdx = idx;
            const item = cart[idx];
            showModal("qtyModal", "Edit Quantity", item.name, item.qty);
        }

        function showModal(modalId, title, pName, qty) {
            if(modalId === "qtyModal") {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalPName').innerText = pName;
                document.getElementById('qtyInput').value = qty;
            }
            document.getElementById(modalId).classList.add('active');
            if(modalId === "qtyModal") setTimeout(() => document.getElementById('qtyInput').focus(), 100);
        }

        function handleConfirm() {
            const qty = parseInt(document.getElementById('qtyInput').value);
            if(qty < 1 || isNaN(qty)) return;

            if(editIdx > -1) {
                cart[editIdx].qty = qty;
            } else {
                const existing = cart.find(i => i.id === activeProduct.id);
                if(existing) existing.qty += qty;
                else cart.push({...activeProduct, qty});
            }
            
            closeModal('qtyModal');
            updateCart();
            document.getElementById('searchInput').focus();
            document.getElementById('searchInput').value = "";
            renderProducts();
        }

        function updateCart() {
            const list = document.getElementById('cartItems');
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="item-details">
                        <h4 style="font-size:0.85rem">${item.name}</h4>
                        <span style="font-size:0.75rem">${item.qty} x Rs ${item.price}</span>
                    </div>
                    <div class="item-actions">
                        <span class="btn-edit" onclick="openEditModal(${i})">Edit</span>
                        <span class="btn-delete" onclick="deleteItem(${i})">×</span>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + (i.qty * i.price), 0);
            document.getElementById('total').innerText = `Rs ${total}`;
            document.getElementById('itemCount').innerText = cart.length;
        }

        function deleteItem(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function openCheckoutModal() {
            if(cart.length === 0) return alert("Cart is empty!");
            const receipt = document.getElementById('receiptContent');
            receipt.innerHTML = cart.map(item => `
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
                    <span>${item.name} x${item.qty}</span>
                    <span>Rs ${item.qty * item.price}</span>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + (i.qty * i.price), 0);
            document.getElementById('modalTotal').innerText = `Rs ${total}`;
            showModal("checkoutModal");
        }

        function finalizeOrder() {
            cart = [];
            updateCart();
            closeModal('checkoutModal');
            document.getElementById('searchInput').focus();
        }

        function filterProducts() { renderProducts(document.getElementById('searchInput').value); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Keyboard Logic
        window.onload = () => { renderProducts(); document.getElementById('searchInput').focus(); };
        window.addEventListener('keydown', (e) => {
            if(e.key === 'F10') openCheckoutModal();
            if(e.key === 'Escape') { closeModal('qtyModal'); closeModal('checkoutModal'); }
        });
        document.getElementById('qtyInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleConfirm();
        });
    </script>
</body>
</html>
